name: Deploy Dagangan to STB

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install cloudflared
      run: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Install & Build
      run: |
        npm install
        echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
        echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
        npm run build

    - name: Deploy to STB via Rsync
      run: |
        # 1. Siapkan kunci SSH di server GitHub
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        
        # 2. Daftarkan host agar tidak ditanya yes/no (StrictHostKeyChecking)
        # Kita pakai -o StrictHostKeyChecking=no nanti di rsync agar lebih praktis
        
        # 3. Kirim folder dist ke STB menggunakan rsync lewat tunnel cloudflared
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ProxyCommand='cloudflared access ssh --hostname %h'" \
          dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/www/wwwroot/dagangan.abelkarbel.tech/